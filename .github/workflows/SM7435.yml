name: Cosmic Kernel CI-Garnet

on:
  workflow_dispatch:

jobs:
  Kernel_Build_CI:
    name: Cosmic Kernel Build
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TG_BOT: "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}"
      CHAT_ID: "${{ secrets.TG_CHAT_ID }}"

    steps:
      - name: Build Execution
        run: |
          touch build_log.txt
          exec > >(tee -a build_log.txt) 2>&1

          echo "Initializing Environment..."
          sudo apt-get update -qq
          sudo apt-get install -y jq bc bison build-essential flex libssl-dev libelf-dev openjdk-17-jre-headless lsb-release
          sudo timedatectl set-timezone Asia/Kolkata
          
          # Massive 12GB SSD Swap (Replacing ZRAM for Azure compatibility)
          echo "Setting up 12GB Swap..."
          sudo swapoff -a
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

          echo "Cloning Sources..."
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sm7435.git --depth=1 -b lineage-23.2 kernel
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sm7435-modules.git --depth=1 -b lineage-23.2 kernel/kernel/xiaomi/sm7435-modules
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 --depth=1 --filter=blob:none -b main clang-repo
          
          curl -sLo zipsigner.jar https://github.com/mosezhs/zipsigner/raw/master/zipsigner-3.0.jar
          mkdir clang && mv clang-repo/clang-r522817/* clang/ && rm -rf clang-repo
          
          if [ -d "kernel" ]; then
            cd kernel
            echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
            echo "ZIP_TS=$(date '+%d%m%Y-%H%M')" >> $GITHUB_ENV
            echo "K_VER=$(make kernelversion)" >> $GITHUB_ENV
            echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
            
            export PATH=$(pwd)/../clang/bin:$PATH
            MAKE_ARGS="ARCH=arm64 CC=clang NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip LD=ld.lld CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1"
            
            make O=out $MAKE_ARGS gki_defconfig vendor/garnet_GKI.config
            # LTO needs lots of RAM; the 12GB swap will handle the spillover
            make -j$(nproc --all) O=out $MAKE_ARGS
          else
            echo "CRITICAL: Kernel directory missing."
            exit 1
          fi

      - name: Handle Success & Signing
        if: success()
        run: |
          mkdir -p output
          cp kernel/out/arch/arm64/boot/Image output/
          find kernel/out/arch/arm64/boot -name "dtbo.img" -exec cp {} output/ \;
          find kernel/out -name "*.ko" -exec cp {} output/ \;
          cd output && zip -r9 ../unsigned.zip * && cd ..
          
          FINAL_ZIP="Cosmic-v${{ env.K_VER }}-violet-dynamic-${{ env.ZIP_TS }}-signed.zip"
          java -jar zipsigner.jar unsigned.zip "$FINAL_ZIP"
          
          DIFF=$(( $(date +%s) - START_TIME ))
          MIN=$(( DIFF / 60 ))
          SEC=$(( DIFF % 60 ))
          MD5=$(md5sum "$FINAL_ZIP" | cut -d' ' -f1)
          
          CAPTION=$(printf "<b>Build Success</b>\n\n<b>Commit:</b> <code>${{ env.COMMIT_SHA }}</code>\n<code>Build took : $MIN minute(s) and $SEC second(s) | MD5 Checksum : $MD5</code>")
          curl -F chat_id="${{ env.CHAT_ID }}" -F document=@"$FINAL_ZIP" -F parse_mode="HTML" -F caption="$CAPTION" "${{ env.TG_BOT }}/sendDocument"

      - name: Handle Failure
        if: failure()
        run: |
          [ -s build_log.txt ] && tail -n 500 build_log.txt > error_log.txt || echo "Check Actions Console." > error_log.txt
          CAPTION=$(printf "<b>Build Failed</b>\n\n<b>Commit:</b> <code>${{ env.COMMIT_SHA }}</code>\n<i>Last 500 lines of trace attached.</i>")
          curl -F chat_id="${{ env.CHAT_ID }}" -F document=@"error_log.txt" -F parse_mode="HTML" -F caption="$CAPTION" "${{ env.TG_BOT }}/sendDocument"
